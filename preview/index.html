// fallback for unimplemented screens
function fallback(key) {
  return `
${dtitle('рЯФІ ' + key.toUpperCase())}
${SEP}

  ${y('This sub-menu is available on a real VPS server.')}
  ${w('All functionality works when the script is installed via:')}

<span class="menu-item" onclick="choose('main')">${w('  [вЖР MAIN MENU]')}</span>
`;
}

let current = 'main';

function render(key) {
  current = key;
  const fn = SCREENS[key];
  screen.innerHTML = fn ? fn() : fallback(key);
  screen.scrollTop = 0;
  input.value = '';
  input.focus();
}

function choose(key) {
  render(key);
}

input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  if (!val) return;

  // Map numeric inputs to actions based on current screen
  const maps = {
    main:   {'1':'dnstt','2':'ssh','3':'system','0':'exit'},
    dnstt:  {'1':'dnstt_install','2':'dnstt_status','3':'dnstt_info','4':'dnstt_logs',
              '5':'dnstt_perf','6':'dnstt_stats','7':'dnstt_bw','8':'dnstt_fix',
              '9':'dnstt_ts','10':'dnstt_restart','11':'dnstt_bkp','12':'dnstt_rst',
              '13':'dnstt_stop','14':'dnstt_uninstall','0':'main'},
    ssh:    {'1':'ssh_add','2':'ssh_list','3':'ssh_renew','4':'ssh_lock','5':'ssh_unlock',
              '6':'ssh_banner','7':'ssh_ar','8':'ssh_ar_status','9':'ssh_backup','10':'ssh_del','0':'main'},
    system: {'1':'sys_vps','2':'sys_opt','3':'sys_mon','4':'sys_clean','5':'sys_update','0':'main'},
  };

  const map = maps[current] || {};
  const next = map[val] || val;
  if (SCREENS[next] || Object.values(maps).some(m => Object.values(m).includes(next))) {
    render(next);
  } else {
    render(current); // invalid choice вАФ redraw
  }
});

// boot
render('main');
input.focus();
</script>
